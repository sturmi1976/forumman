{namespace fm=Lanius\Forumman\ViewHelpers}
<f:comment>Title Tag</f:comment>
<f:if condition="{settings.titleTag}">
        <fm:pageTitle title="{settings.titleTag}" />
        <fm:metaTag property="og:title" content="{settings.titleTag}" />
</f:if>
<f:if condition="{settings.metaDescription}">
    <fm:metaTag property="og:description" content="{settings.metaDescription}" />
    <fm:metaTag name="description" content="{settings.metaDescription}" />
</f:if>

<fm:metaTag name="robots" content="index,follow" />

<f:if condition="{ogImageObject}">
    <fm:metaTag property="og:image" content="{f:uri.image(image: ogImageObject, absolute: 1)}" />
</f:if>


<div class="forum"> 


<f:for each="{categories}" as="category">

<section class="forum-category">

<header class="forum-category-header">
    <h2 class="forum-category-title">{category.title}</h2>
</header>

<div class="forum-list">

<f:for each="{category.forums}" as="forum">

<article class="forum-card">

    <div class="forum-main">

        <h3 class="forum-title">
            <f:link.action action="showThreads" arguments="{forumUid: forum.uid}">
    {forum.title}
</f:link.action>
        </h3>

        <p class="forum-description">
            <f:format.raw>
            {forum.description}
            </f:format.raw>
        </p>

    </div>

    <div class="forum-meta">

        <div class="forum-stat">
            <span class="forum-stat-number">{forum.threadCountDynamic}</span>
            <span class="forum-stat-label">Threads</span>
        </div>

        <div class="forum-stat">
            <span class="forum-stat-number">{forum.postCountDynamic}</span>
            <span class="forum-stat-label">Posts</span>
        </div>

    </div>

    <div>
    
    </div>

</article>

</f:for>

</div>

</section>

</f:for>

</div>
