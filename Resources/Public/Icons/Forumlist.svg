<svg xmlns="http://www.w3.org/2000/svg" width="120" height="100" viewBox="0 0 120 100">

    <!-- Icon Gruppe -->
    <g transform="translate(30,0)">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

            <!-- Erster Post -->
            <rect x="2" y="2" width="20" height="6" rx="1" ry="1"></rect>
            <line x1="4" y1="5" x2="10" y2="5"></line>

            <!-- Zweiter Post -->
            <rect x="2" y="10" width="20" height="6" rx="1" ry="1"></rect>
            <line x1="4" y1="13" x2="14" y2="13"></line>

            <!-- Dritter Post -->
            <rect x="2" y="18" width="20" height="4" rx="1" ry="1"></rect>
            <line x1="4" y1="20" x2="12" y2="20"></line>

        </svg>
    </g>

    <!-- Text -->
    <text x="50%" y="90" text-anchor="middle" font-size="12" fill="currentColor">
        Forumlist
    </text>

</svg>