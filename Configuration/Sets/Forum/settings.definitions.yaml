categories:
  Forumman:
    label: 'Forum Manager'           
  Forumman.templates:
    label: 'Templates'                    
    parent: Forumman
  Forumman.pages:
    label: 'Pages'                         
    parent: Forumman
  Forumman.uids:
    label: 'Page Uids and folder'
    parent: Forumman
  Forumman.emails:
    label: 'Email settings'
    parent: Forumman

settings:
  forumman.templateRootPath:
    label: 'Templates'                     
    category: Forumman.templates            
    description: 'Path to template root'   
    type: string                          
    default: 'EXT:forumman/Resources/Private/Templates/'  

  forumman.partialRootPath:
    label: 'Partials'
    category: Forumman.templates
    description: 'Path to partial root'
    type: string
    default: 'EXT:forumman/Resources/Private/Partials/'

  forumman.layoutRootPath:
    label: 'Layouts'
    category: Forumman.templates
    description: 'Path to layout root'
    type: string
    default: 'EXT:forumman/Resources/Private/Layouts/'

  forumman.pid:
    label: 'Storage folder'
    category: Forumman.uids
    description: 'The uid of storage folder'
    type: string
    default: '0'

  forumman.uid:
    label: 'Uid of Forum Page'
    category: Forumman.uids
    description: 'The uid of Forum Page (Frontend Plugin)'
    type: string
    default: '0'

  forumman.register_uid:
    label: 'Uid of Register Page'
    category: Forumman.uids
    description: 'The uid of Register Page (Frontend Plugin - Registerform)'
    type: string
    default: '0'

  forumman.user_uid:
    label: 'Uid of User Storage Folder'
    category: Forumman.uids
    description: 'The uid of User Storage Folder'
    type: string
    default: '0'

  forumman.emailName:
    label: 'Email sender name'
    category: Forumman.emails
    description: 'Name displayed as the sender in system emails (e.g. "Forum Team").'
    type: string
    default: 'Forum Team'

  forumman.emailFromAddress:
    label: 'Email sender address'
    category: Forumman.emails
    description: 'Email address used as the sender for system emails (e.g. no-reply@yourdomain.com).'
    type: string
    default: 'no-reply@yourdomain.com'
